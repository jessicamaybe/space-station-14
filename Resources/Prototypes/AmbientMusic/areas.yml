- type: ambientMusic
  id: Morgue
  sound:
    params:
      volume: -12
    collection: AmbienceSpooky
  priority: 4
  conditions:
  - !type:NearbyComponentsCondition
    anchored: true
    count: 2
    components:
    - type: Morgue
    range: 3

- type: ambientMusic
  id: Maintenance
  sound:
    params:
      volume: -12
    collection: AmbienceMaintenance
  priority: 2
  conditions:
  - !type:NearbyTilesPercentCondition
    ignoreAnchored: true
    percent: 0.25
    tiles:
    - Plating
    range: 2

- type: ambientMusic
  id: Space
  sound:
    params:
      volume: -10
    collection: AmbienceSpace
  fadeIn: true
  interruptable: true
  priority: 1
  conditions:
  - !type:InSpaceCondition
  - !type:GridInRangeCondition
    inverted: true
    range: 3
  - !type:IsGhostCondition
    inverted: true

- type: ambientMusic
  id: Mining
  sound:
    params:
      volume: -12
    collection: AmbienceMining
  fadeIn: true
  interruptable: true
  priority: 4
  conditions:
  - !type:OnMapGridCondition

- type: ambientMusic
  id: Salvage
  sound:
    params:
      volume: -12
    collection: AmbienceRuins
  fadeIn: true
  interruptable: true
  priority: 4
  conditions:
  - !type:GridInRangeCondition # make sure we're on or near a grid
    range: 4
  - !type:OnStationGridCondition # make sure that grid isn't the station
    inverted: true
  - !type:NearPlayerCondition # only want the spooky sounds to play when the player is somewhat isolated
    inverted: true
    count: 2
    range: 10
  - !type:NearbyComponentsCondition # make sure we aren't on a shuttle
    anchored: true
    count: 1
    components:
    - type: Thruster
    range: 10
