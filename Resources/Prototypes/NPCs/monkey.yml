- type: htnCompound
  id: MonkeyCompound
  branches:
  - tasks:
    - !type:HTNCompoundTask
      task: DisposalsNearbyCompound
  - tasks:
    - !type:HTNCompoundTask
      task: MeleeCombatCompound
  - tasks:
    - !type:HTNWeightedRandomCompoundTask
      weights:
        DropItemNearby: 0.02
        ActivateInHandCompound: 0.02
        PickupItemCompound: 0.02
        IdleCompound: 1

- type: utilityQuery
  id: NearbyItems
  query:
  - !type:ComponentQuery
    components:
    - type: Item
  - !type:RemoveAnchoredFilter
  - !type:ComponentFilter
    retainWithComp: false
    components:
    - type: MultiHandedItem

- type: htnCompound
  id: PickupItemCompound
  branches:
  - preconditions:
    - !type:ActiveHandFreePrecondition
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyItems
    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
    - !type:HTNPrimitiveTask
      preconditions:
      - !type:ActiveHandFreePrecondition
      - !type:TargetInRangePrecondition
        targetKey: Target
        rangeKey: InteractRange
      operator: !type:InteractWithOperator
        targetKey: Target

- type: htnCompound
  id: ActivateInHandCompound
  branches:
  - preconditions:
    - !type:ActiveHandEntityPrecondition
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ActivateInHandOperator

- type: htnCompound
  id: DropItemNearby
  branches:
  - preconditions:
      - !type:ActiveHandEntityPrecondition
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:PickAccessibleOperator
        # originKey: FollowTarget
        rangeKey: FollowCloseRange
        targetCoordinates: FollowIdleTarget
    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        targetKey: FollowIdleTarget
    - !type:HTNPrimitiveTask
      operator: !type:RandomOperator
        targetKey: IdleTime
        minKey: MinimumIdleTime
        maxKey: MaximumIdleTime
    - !type:HTNPrimitiveTask
      operator: !type:DropOperator
    - !type:HTNCompoundTask
      task: IdleCompound

- type: htnCompound
  id: DisposalsNearbyCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:PickEntityNearMobOperator
        rangeKey: VisionRadius
        targetKey: FlushableTarget
        nearbyEntityTargetKey: DisposalBinTarget
        targetMoveKey: TargetCoordinates
        mobState: Critical
        mobRangeKey: InteractRange
        whitelist:
          components:
          - DisposalUnit
        blacklist:
          components:
          - MailingUnit

    - !type:HTNPrimitiveTask
      operator: !type:MoveToOperator
        pathfindInPlanning: false

    - !type:HTNPrimitiveTask
      operator: !type:SetFloatOperator
        targetKey: IdleTime
        amount: 1

    - !type:HTNPrimitiveTask
      operator: !type:WaitOperator
        key: IdleTime
      preconditions:
      - !type:KeyExistsPrecondition
        key: IdleTime

    - !type:HTNPrimitiveTask
      operator: !type:DisposalInsertOperator
        targetKey: FlushableTarget
        disposalTargetKey: DisposalBinTarget

    - !type:HTNPrimitiveTask
      operator: !type:SetFloatOperator
        targetKey: IdleTime
        amount: 1

    - !type:HTNPrimitiveTask
      operator: !type:WaitOperator
        key: IdleTime
      preconditions:
      - !type:KeyExistsPrecondition
        key: IdleTime
